[tool.pytest.ini_options]
testpaths = ["backend/tests"]
addopts = "--strict-markers --disable-warnings"

[tool.ruff]
target-version = "py310"
line-length = 110
extend-exclude = ["frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101"]
